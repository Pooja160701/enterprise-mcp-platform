services:

  api:

    build:

      context: ./ai-gateway

    container_name: enterprise-api

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_started

      prometheus:
        condition: service_started

    volumes:
      - ./ai-gateway:/app
      - ./mcp-servers:/mcp-servers
      - /var/run/docker.sock:/var/run/docker.sock
      - ${USERPROFILE}/.kube:/root/.kube:ro

    restart: unless-stopped

  postgres:

    image: postgres:16

    container_name: enterprise-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: enterprise_mcp

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:

    image: redis:7

    container_name: enterprise-redis

    ports:
      - "6379:6379"

    restart: unless-stopped

  prometheus:

    image: prom/prometheus:latest

    container_name: enterprise-prometheus

    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest

    container_name: enterprise-grafana

    restart: unless-stopped

    ports:
      - "3001:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning

    depends_on:
      - prometheus

volumes:

  postgres_data:

  grafana_data: